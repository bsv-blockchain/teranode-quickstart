x-teranode-base:
  &teranode-base
  image: ghcr.io/bsv-blockchain/teranode:${TERANODE_VERSION:-v0.14.3}
  networks:
    - teranode-network
  volumes:
    - ../config/wait.sh:/app/wait.sh
    - ../config/entrypoint.sh:/app/entrypoint.sh
    - teranode-data:/app/data
  env_file:
    - ../.env
  environment:
    SETTINGS_CONTEXT: ${SETTINGS_CONTEXT:-docker.m}
    USE_LOCAL_AEROSPIKE: "true"
    USE_LOCAL_POSTGRES: "true"
    USE_LOCAL_KAFKA: "true"

services:
  blockchain:
    <<: *teranode-base
    container_name: blockchain
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-blockchain=1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 60s
    restart: on-failure

  asset:
    <<: *teranode-base
    container_name: asset
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-asset=1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
    ports:
      - "${HOST_IP:-127.0.0.1}:8090:8090"
    depends_on:
      blockchain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 7s
    restart: on-failure

  legacy:
    <<: *teranode-base
    container_name: legacy
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-legacy=1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
    depends_on:
      blockchain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 7s
    restart: on-failure

  subtreevalidation:
    <<: *teranode-base
    container_name: subtreevalidation
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-subtreevalidation=1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
    depends_on:
      blockchain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 7s
    restart: on-failure

  blockvalidation:
    <<: *teranode-base
    container_name: blockvalidation
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-blockvalidation=1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
    depends_on:
      blockchain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 7s
    restart: on-failure

  blockassembly:
    <<: *teranode-base
    container_name: blockassembly
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-blockassembly=1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
    depends_on:
      blockchain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 7s
    restart: on-failure

  propagation:
    <<: *teranode-base
    container_name: propagation
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-propagation=1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
    ports:
      - "127.0.0.1:8084:8084"
    depends_on:
      blockchain:
        condition: service_healthy
      blockvalidation:
        condition: service_healthy
      blockassembly:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 7s
    restart: on-failure

  peer:
    <<: *teranode-base
    container_name: peer
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-p2p=1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
    ports:
      - "${HOST_IP:-127.0.0.1}:9905:9905"
    depends_on:
      blockchain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 7s
    restart: on-failure

  rpc:
    <<: *teranode-base
    container_name: rpc
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-rpc=1"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
    ports:
      - "127.0.0.1:9292:9292"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 7s
    depends_on:
      blockchain:
        condition: service_healthy
    restart: on-failure

  pruner:
    <<: *teranode-base
    container_name: pruner
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-pruner=1"]
    depends_on:
      blockchain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 7s
    restart: on-failure

  blockpersister:
    <<: *teranode-base
    container_name: blockpersister
    entrypoint: ["/app/entrypoint.sh"]
    command: ["-blockpersister=1"]
    depends_on:
      blockchain:
        condition: service_healthy
      blockvalidation:
        condition: service_healthy
      blockassembly:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=5 http://localhost:8000/health || [ $? = 8 ]"]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 7s
    profiles:
      - blockpersister
    restart: on-failure

  seeder:
    <<: *teranode-base
    container_name: seeder
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep infinity"]
    volumes:
      - ${SEED_DATA_PATH:-./}:/seed:ro
    depends_on:
      - aerospike
      - postgres
      - kafka-shared
    profiles:
      - seeding
